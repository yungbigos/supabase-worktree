name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck bin/supabase-worktree

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: help / version
        run: |
          chmod +x bin/supabase-worktree
          ./bin/supabase-worktree version
          ./bin/supabase-worktree help
