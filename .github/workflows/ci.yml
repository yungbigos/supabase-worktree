name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        # Gate on real warnings + errors. Style-level findings (e.g. SC2250
        # "prefer ${var} over $var") would otherwise fail the build for
        # cosmetic reasons across the whole file; not a useful CI signal.
        run: shellcheck --severity=warning bin/supabase-worktree

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: help / version
        run: |
          chmod +x bin/supabase-worktree
          ./bin/supabase-worktree version
          ./bin/supabase-worktree help
